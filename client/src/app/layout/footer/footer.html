        <div class="flex flex-col items-center md:items-start md:flex-row space-y-4 md:space-y-0 md:space-x-10 shrink-0">
            <a routerLink="/"><img class="size-12 rounded-full" src="/images/logo.jpg" alt=""></a>

                    </svg>
                    <span>+38269230839</span>
                </div>
                <div class="flex items-center space-x-2 text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                    </svg>                      
                    <span>sportiva&#64;gmail.com</span>
                </div>

                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />

        </div>
        <div class="flex items-center space-x-5 lg:space-x-8 ml-6 lg:ml-10">
            @for(route of routes; track route.href) {
                <a 
                    class="flex items-center space-x-2 text-white font-medium hover:underline"
                    [routerLink]="route.href">
                    <span>{{route.name}}</span>
                </a>
            }
        </div>
    </div>
</div>
