<div class="flex items-center justify-center py-20 px-4 bg-gray-50">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

      <!-- Header -->
      <div class="mb-8">
        <h1 class="text-2xl font-semibold text-gray-900">Prijava</h1>
        <p class="text-sm text-gray-500 mt-1">Prijavite se na svoj nalog</p>
      </div>

      <!-- Form -->
      <div class="flex flex-col gap-5">
        <!-- Email -->
        <app-input
          inputId="email"
          name="email"
          type="email"
          label="Email"
          placeholder="Unesite Vašu email adresu"
          [error]="formErrors.errors()['email']"
          [value]="credentials().email"
          (valueChange)="updateCredentials('email', $event)"/>

        <!-- Password -->
        <app-input
          inputId="password"
          name="password"
          type="password"
          label="Lozinka"
          placeholder="Unesite Vašu lozinku"
          [error]="formErrors.errors()['password']"
          [value]="credentials().password"
          (valueChange)="updateCredentials('password', $event)"/>

        <!-- Forgot password -->
        <div class="flex justify-end -mt-2">
          <a routerLink="/zaboravljena-lozinka" class="text-xs text-teal-600 hover:underline transition-all">
            Zaboravljena lozinka?
          </a>
        </div>

        <!-- Submit -->
        <button class="w-full py-2.5 px-4 bg-teal-600 hover:bg-teal-700 text-white text-sm font-medium rounded-lg transition-colors duration-150 flex items-center justify-center gap-2"
            [class]="loading() ? 'pointer-events-none' : 'cursor-pointer'"
            [disabled]="loading()"
            (click)="login()">
          @if (loading()) { <app-spinner color="white" /> } 
          @else {<span>Prijava</span> }
        </button>

      </div>

      <!-- Footer -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Nemate nalog?
        <a href="/registracija" class="text-teal-600 hover:text-teal-700 font-medium transition-colors">
          Registrujte se
        </a>
      </p>

    </div>
  </div>
</div>
