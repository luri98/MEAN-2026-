<div class="flex items-center justify-center py-20 px-4 bg-gray-50">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

      <!-- Header -->
      <h1 class="text-2xl font-semibold text-gray-900 mb-8">Resetovanje lozinke</h1>

      <!-- Form -->
      <div class="flex flex-col gap-5">
        <!-- Password -->
        <app-input
          inputId="password"
          name="password"
          type="password"
          label="Lozinka"
          placeholder="Unesite Vašu lozinku"
          [error]="formErrors.errors()['password']"
          [value]="form().password"
          (valueChange)="updateForm('password', $event)"/>

        <!-- Confirm Password -->
        <app-input
          inputId="confirmPassword"
          name="confirmPassword"
          type="password"
          label="Potvrdite lozinku"
          placeholder="Potvrdite Vašu lozinku"
          [error]="formErrors.errors()['confirmPassword']"
          [value]="form().confirmPassword"
          (valueChange)="updateForm('confirmPassword', $event)"/>
        
        <!-- Submit -->
        <button class="w-full py-2.5 px-4 bg-teal-600 hover:bg-teal-700 text-white text-sm font-medium rounded-lg transition-colors duration-150 flex items-center justify-center gap-2 cursor-pointer"
            [class]="loading() ? 'pointer-events-none' : 'cursor-pointer'"
            [disabled]="loading()"
            (click)="submit()">
          @if (loading()) { <app-spinner color="white" /> } 
          @else {<span>Promijeni lozinku</span> }
        </button>
      </div>
    </div>
  </div>
</div>
