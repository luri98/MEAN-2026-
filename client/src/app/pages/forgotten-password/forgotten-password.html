<div class="flex items-center justify-center py-20 px-4 bg-gray-50">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

      <!-- Header -->
      <div class="mb-8">
        <h1 class="text-2xl font-semibold text-gray-900">Reset lozinke</h1>
        <p class="text-sm text-gray-500 mt-1">Pošaljite e-mail za resetovanje Vaše lozinke</p>
      </div>

      <!-- Form -->
      <div class="flex flex-col gap-5">
        <!-- Email -->
        <app-input
          inputId="email"
          name="email"
          type="email"
          label="Email"
          placeholder="Unesite Vašu email adresu"
          [error]="formErrors.errors()['email']"
          [value]="email()"
          (valueChange)="email.set($event); formErrors.deleteError('email')" />
   
        <!-- Submit -->
        <button class="w-full py-2.5 px-4 bg-teal-600 hover:bg-teal-700 text-white text-sm font-medium rounded-lg transition-colors duration-150 flex items-center justify-center gap-2 cursor-pointer"
            [class]="loading() ? 'pointer-events-none' : 'cursor-pointer'"
            [disabled]="loading()"
            (click)="submit()">
          @if (loading()) { <app-spinner color="white" /> } 
          @else {<span>Resetuj lozinku</span> }
        </button>

      </div>
    </div>
  </div>
</div>
