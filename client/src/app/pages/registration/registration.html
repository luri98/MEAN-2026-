<div class="flex items-center justify-center py-20 px-4 bg-gray-50">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

      <!-- Header -->
      <h1 class="text-2xl font-semibold text-gray-900 mb-8">Registracija</h1>

      <!-- Form -->
      <div class="flex flex-col gap-5">
        <!-- Name -->
        <app-input
          inputId="name"
          name="name"
          type="text"
          label="Ime i prezime"
          placeholder="Unesite Vaše ime i prezime"
          [error]="formErrors.errors()['name']"
          [value]="form().name"
          (valueChange)="updateForm('name', $event)"/>

        <!-- Email -->
        <app-input
          inputId="email"
          name="email"
          type="email"
          label="Email"
          placeholder="Unesite Vašu email adresu"
          [error]="formErrors.errors()['email']"
          [value]="form().email"
          (valueChange)="updateForm('email', $event)"/>

        <!-- Password -->
        <app-input
          inputId="password"
          name="password"
          type="password"
          label="Lozinka"
          placeholder="Unesite Vašu lozinku"
          [error]="formErrors.errors()['password']"
          [value]="form().password"
          (valueChange)="updateForm('password', $event)"/>

        <!-- Confirm Password -->
        <app-input
          inputId="confirmPassword"
          name="confirmPassword"
          type="password"
          label="Potvrdite lozinku"
          placeholder="Potvrdite Vašu lozinku"
          [error]="formErrors.errors()['confirmPassword']"
          [value]="form().confirmPassword"
          (valueChange)="updateForm('confirmPassword', $event)"/>
        
        <!-- Submit -->
        <button class="w-full py-2.5 px-4 bg-teal-600 hover:bg-teal-700 text-white text-sm font-medium rounded-lg transition-colors duration-150 flex items-center justify-center gap-2"
            [class]="loading() ? 'pointer-events-none' : 'cursor-pointer'"
            [disabled]="loading()"
            (click)="register()">
          @if (loading()) { <app-spinner color="white" /> } 
          @else {<span>Registracija</span> }
        </button>
      </div>
    </div>
  </div>
</div>
